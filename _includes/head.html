<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>
    {%- if page.title -%}
      {{ page.title }} | {{ site.title }}
    {%- else -%}
      {{ site.title }}
    {%- endif -%}
  </title>

  <meta name="description" content="{%- if page.description -%}{{ page.description }}{%- elsif page.excerpt -%}{{ page.excerpt | strip_html | truncatewords: 30 }}{%- else -%}{{ site.description }}{%- endif -%}" />

  {%- if page.url -%}
  <link rel="canonical" href="{{ page.url | absolute_url | replace:'index.html','' }}" />
  {%- endif -%}

  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}" />
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}" />
</head>
